<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1024" viewBox="0 0 2048 1024">
  <!-- 1. Block tile (0, 0) -->
  <g transform="translate(0, 0)">
    <rect x="48" y="64" width="416" height="400" rx="64" fill="#B4B4B4" />
    <rect x="48" y="48" width="416" height="400" rx="64" fill="#F0F0F0" />
    <rect x="64" y="56" width="384" height="352" rx="48" fill="#FFFFFF" />
  </g>

  <!-- 2. Empty cell (512, 0) -->
  <g transform="translate(512, 0)">
    <rect x="48" y="48" width="416" height="416" rx="64" fill="#191924" />
    <rect x="64" y="64" width="384" height="384" rx="48" fill="#0D0D14" />
  </g>

  <!-- 3. Button (1024, 0) -->
  <g transform="translate(1024, 0)">
    <rect x="40" y="160" width="432" height="224" rx="64" fill="#B4B4B4" />
    <rect x="40" y="128" width="432" height="224" rx="64" fill="#F5F5F5" />
    <rect x="56" y="140" width="400" height="180" rx="48" fill="#FFFFFF" />
  </g>

  <!-- 4. Panel/card (1536, 0) -->
  <g transform="translate(1536, 0)">
    <rect x="32" y="32" width="448" height="448" rx="64" fill="#1E2A44" />
    <rect x="44" y="44" width="424" height="424" rx="52" fill="#253556" />
  </g>

  <!-- 5. Gear (0, 512) -->
  <!-- Transparent center by using a thick stroke rather than a mask -->
  <g transform="translate(256, 768)" fill="none" stroke="#FFFFFF" stroke-width="40">
    <circle r="70" />
    <line x1="0" y1="-70" x2="0" y2="-140" stroke-linecap="round" />
    <line x1="0" y1="70" x2="0" y2="140" stroke-linecap="round" />
    <line x1="-70" y1="0" x2="-140" y2="0" stroke-linecap="round" />
    <line x1="70" y1="0" x2="140" y2="0" stroke-linecap="round" />
    
    <line x1="-49.5" y1="-49.5" x2="-99.0" y2="-99.0" stroke-linecap="round" />
    <line x1="49.5" y1="49.5" x2="99.0" y2="99.0" stroke-linecap="round" />
    <line x1="49.5" y1="-49.5" x2="99.0" y2="-99.0" stroke-linecap="round" />
    <line x1="-49.5" y1="49.5" x2="-99.0" y2="99.0" stroke-linecap="round" />
  </g>

  <!-- 6. Crown (512, 512) -->
  <g transform="translate(768, 768)" fill="#FFD700">
    <rect x="-110" y="90" width="220" height="30" rx="15" />
    <path d="M -110,70 L -130,-70 L -50,10 L 0,-110 L 50,10 L 130,-70 L 110,70 Z" stroke-linejoin="round" />
    <circle cx="-130" cy="-70" r="20" />
    <circle cx="0" cy="-110" r="24" />
    <circle cx="130" cy="-70" r="20" />
  </g>

  <!-- 7. Star/sparkle (1024, 512) -->
  <g transform="translate(1280, 768)">
    <circle r="120" fill="#FFFFFF" fill-opacity="0.05" />
    <circle r="90" fill="#FFFFFF" fill-opacity="0.1" />
    <circle r="60" fill="#FFFFFF" fill-opacity="0.2" />
    <circle r="40" fill="#FFFFFF" fill-opacity="0.4" />
    <path d="M 0,-180 Q 20,-30 180,0 Q 20,30 0,180 Q -20,30 -180,0 Q -20,-30 0,-180 Z" fill="#FFFFFF" />
    <circle r="30" fill="#FFFFFF" />
  </g>

  <!-- 8. Radial glow (1536, 512) -->
  <g transform="translate(1792, 768)">
    <circle r="220" fill="#FFFFFF" fill-opacity="0.02" />
    <circle r="200" fill="#FFFFFF" fill-opacity="0.04" />
    <circle r="180" fill="#FFFFFF" fill-opacity="0.06" />
    <circle r="160" fill="#FFFFFF" fill-opacity="0.08" />
    <circle r="140" fill="#FFFFFF" fill-opacity="0.1" />
    <circle r="120" fill="#FFFFFF" fill-opacity="0.15" />
    <circle r="100" fill="#FFFFFF" fill-opacity="0.2" />
    <circle r="80"  fill="#FFFFFF" fill-opacity="0.3" />
    <circle r="60"  fill="#FFFFFF" fill-opacity="0.5" />
    <circle r="40"  fill="#FFFFFF" fill-opacity="0.8" />
    <circle r="20"  fill="#FFFFFF" fill-opacity="1.0" />
  </g>

</svg>
